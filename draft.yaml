seeders: Divison, District, UniversityType, UniversityFundType, University, UniversityProgramType, UniversityProgram

controllers:
  Divison:
    index:
      query: all:divisions
      render: division.index with:divisions
    create:
      render: division.create
    store:
      validate: title, status
      save: division
      flash: division.title
      redirect: division.index
    show:
      render: division.show with:division
    edit:
      render: division.edit with:division
    update:
      validate: division
      update: division
      flash: division.id
      redirect: division.index
    destroy:
      delete: division
      redirect: division.index
  District:
    index:
      query: all:districts
      render: division.index with:districts
    create:
      render: division.create
    store:
      validate: title, status
      save: division
      flash: division.title
      redirect: division.index
    show:
      render: division.show with:division
    edit:
      render: division.edit with:division
    update:
      validate: division
      update: division
      flash: division.id
      redirect: division.index
    destroy:
      delete: division
      redirect: division.index
